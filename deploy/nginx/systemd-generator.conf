# systemd Unit Generator — static site (SvelteKit adapter-static)
#
# Deploy:
#   pnpm build
#   sudo rsync -av --delete build/ /var/www/systemd-generator/
#   sudo cp deploy/nginx/security-headers.conf /etc/nginx/snippets/systemd-generator-security-headers.conf
#   sudo cp deploy/nginx/systemd-generator.conf /etc/nginx/sites-available/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Enable:
#   sudo ln -sf /etc/nginx/sites-available/systemd-generator.conf /etc/nginx/sites-enabled/
#
# TLS (certbot example):
#   sudo certbot certonly --nginx -d systemd-generator.stefanbogdanovic.dev
#
# If nginx -t fails with "duplicate listen options for 0.0.0.0:443", another
# site (e.g. website.conf) already owns `reuseport` on 443 — remove reuseport
# from all but ONE server block on the machine, or drop the quic listen lines
# from the duplicate config.

server {
    # HTTP/2 + HTTP/3. Do NOT use reuseport here if another vhost already
    # has `listen 443 quic reuseport` (causes "duplicate listen options" emerg).
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    http2 on;
    http3 on;
    quic_retry on;
    server_name systemd-generator.stefanbogdanovic.dev;

    ssl_certificate     /etc/letsencrypt/live/systemd-generator.stefanbogdanovic.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/systemd-generator.stefanbogdanovic.dev/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/systemd-generator.access.log;
    error_log  /var/log/nginx/systemd-generator.error.log;

    # CSP + security headers (see security-headers.conf)
    include snippets/systemd-generator-security-headers.conf;

    # Advertise HTTP/3 support to browsers
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    root /var/www/systemd-generator;
    index index.html;

    # SvelteKit hashed assets — cache forever
    location /_app/immutable/ {
        include snippets/systemd-generator-security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Other static assets from /static
    location ~* \.(?:css|js|svg|png|webp|ico|webmanifest|txt|xml)$ {
        include snippets/systemd-generator-security-headers.conf;
        expires 7d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # Prerendered SPA fallback (single route today; safe for future routes)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name systemd-generator.stefanbogdanovic.dev;
    return 301 https://$host$request_uri;
}
