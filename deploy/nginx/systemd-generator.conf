# systemd Unit Generator — static site (SvelteKit adapter-static)
#
# Deploy:
#   pnpm build
#   rsync -av --delete build/ /var/www/systemd-generator/
#
# Enable:
#   sudo ln -sf /etc/nginx/sites-available/systemd-generator.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (certbot example):
#   sudo certbot certonly --nginx -d systemd-generator.stefanbogdanovic.dev

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    http2 on;
    http3 on;
    quic_retry on;
    server_name systemd-generator.stefanbogdanovic.dev;

    ssl_certificate     /etc/letsencrypt/live/systemd-generator.stefanbogdanovic.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/systemd-generator.stefanbogdanovic.dev/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/systemd-generator.access.log;
    error_log  /var/log/nginx/systemd-generator.error.log;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # Advertise HTTP/3 support to browsers
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    root /var/www/systemd-generator;
    index index.html;

    # SvelteKit hashed assets — cache forever
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Other static assets from /static
    location ~* \.(?:css|js|svg|png|webp|ico|webmanifest|txt|xml)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # Prerendered SPA fallback (single route today; safe for future routes)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name systemd-generator.stefanbogdanovic.dev;
    return 301 https://$host$request_uri;
}
